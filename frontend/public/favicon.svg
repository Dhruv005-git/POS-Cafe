<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- Steam wisps -->
  <path d="M22 14 Q23 10 22 6" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  <path d="M32 12 Q33 8 32 4"  stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  <path d="M42 14 Q43 10 42 6" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>

  <!-- Cup body -->
  <path d="M16 22 L20 50 Q20 52 22 52 L42 52 Q44 52 44 50 L48 22 Z"
        fill="url(#cupGrad)" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Cup rim -->
  <rect x="14" y="18" width="36" height="6" rx="3" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Handle -->
  <path d="M44 28 Q56 28 56 36 Q56 44 44 44"
        stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Coffee surface highlight -->
  <ellipse cx="32" cy="21" rx="14" ry="3" fill="#7c3aed" opacity="0.5"/>

  <!-- Gradient def -->
  <defs>
    <linearGradient id="cupGrad" x1="16" y1="22" x2="48" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
</svg>